# 网关服务配置
server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # 认证服务路由
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**,/api/v1/users/**
          filters:
            - StripPrefix=0

        # 系统服务路由
        - id: system-service
          uri: lb://system-service
          predicates:
            - Path=/api/v1/menus/**,/api/v1/roles/**
          filters:
            - StripPrefix=0

        # 文件服务路由
        - id: file-service
          uri: lb://file-service
          predicates:
            - Path=/api/v1/file/**
          filters:
            - StripPrefix=0
            
        # 统计服务路由
        - id: stats-service
          uri: lb://stats-service
          predicates:
            - Path=/api/v1/dashboard/**
          filters:
            - StripPrefix=0

        # 接口文档路由
        - id: swagger-doc
          uri: lb://auth-service
          predicates:
            - Path=/swagger-ui/**
          filters:
            - StripPrefix=0

        - id: swagger-resources
          uri: lb://auth-service
          predicates:
            - Path=/v3/api-docs/**
          filters:
            - StripPrefix=0

        # 网关自身的 Actuator 端点
        - id: gateway-actuator
          uri: http://localhost:8080
          predicates:
            - Path=/actuator/**
          filters:
            - StripPrefix=0

# 日志配置
logging:
  level:
    org.springframework.cloud.gateway: debug